<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#7c3aed",
  "darkNav": false
}/*EDITMODE-END*/;

function App() {
  const [page, setPage]     = useState('home');
  const [params, setParams] = useState({});
  const [user, setUser]     = useState(null);

  function navigate(p, par = {}) {
    setPage(p);
    setParams(par);
    window.scrollTo(0, 0);
  }

  function login() {
    setUser(window.CIAL.data.user);
    navigate('dashboard');
  }

  function logout() {
    setUser(null);
    navigate('home');
  }

  function updateUser(updated) {
    setUser(updated);
  }

  const showNav = page !== 'player';

  return (
    <div>
      {showNav && <Nav page={page} onNavigate={navigate} user={user} onLogout={logout} />}

      {page === 'home'      && <LandingPage onNavigate={navigate} user={user} />}
      {page === 'login'     && <LoginPage onNavigate={navigate} onLogin={login} />}
      {page === 'register'  && <RegisterPage onNavigate={navigate} onLogin={login} />}
      {page === 'catalog'   && <CatalogPage onNavigate={navigate} params={params} user={user} />}
      {page === 'course'    && <CourseDetailPage onNavigate={navigate} params={params} user={user} />}
      {page === 'player'    && (user
        ? <PlayerPage onNavigate={navigate} params={params} user={user} />
        : <LoginPage onNavigate={navigate} onLogin={login} />
      )}
      {page === 'dashboard' && (user
        ? <DashboardPage onNavigate={navigate} user={user} />
        : <LoginPage onNavigate={navigate} onLogin={login} />
      )}
      {page === 'admin'     && (user && user.isAdmin
        ? <AdminPage onNavigate={navigate} user={user} />
        : <LoginPage onNavigate={navigate} onLogin={login} />
      )}
      {page === 'profile'   && (user
        ? <ProfilePage user={user} onUserUpdate={updateUser} onNavigate={navigate} />
        : <LoginPage onNavigate={navigate} onLogin={login} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
window.addEventListener('message', e => {
  if (e.data && e.data.type === '__activate_edit_mode')   document.getElementById('tweaks-panel').classList.add('open');
  if (e.data && e.data.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

document.getElementById('tweaks-close').addEventListener('click', function() {
  document.getElementById('tweaks-panel').classList.remove('open');
  window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
});

document.getElementById('tweak-dark-nav').addEventListener('change', function() {
  var nav = document.querySelector('nav');
  if (nav) nav.style.background = this.checked ? '#1e0a3c' : '#fff';
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { darkNav: this.checked } }, '*');
});

document.querySelectorAll('.color-swatch').forEach(function(sw) {
  sw.addEventListener('click', function() {
    var color = this.dataset.color;
    document.querySelectorAll('.color-swatch').forEach(function(s) { s.style.boxShadow = 'none'; });
    this.style.boxShadow = '0 0 0 2px ' + color;
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: color } }, '*');
  });
});
</script>
